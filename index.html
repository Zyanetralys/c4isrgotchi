<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>C4ISR-GOTCHI // NEXUS v3.1 | TCU-01</title>
  <style>
    :root {
      --bg: #050508; --panel: rgba(12, 18, 28, 0.9); --border: rgba(0, 200, 120, 0.3);
      --text: #c8e6ff; --accent: #00ff88; --warn: #ff4d4d; --info: #4dabf7;
      --glass: blur(12px) saturate(160%); --shadow: 0 8px 32px rgba(0,0,0,0.6);
      --font: 'Inter', system-ui, -apple-system, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden; padding: 12px;
    }
    .app { max-width: 960px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; height: calc(100vh - 24px); }
    
    /* TOP HUD */
    .hud-top { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; }
    @media (max-width: 700px) { .hud-top { grid-template-columns: 1fr; } }
    .hud-panel {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 12px; backdrop-filter: var(--glass); box-shadow: var(--shadow);
    }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
    .stat-row { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
    .stat-label { width: 42px; color: var(--info); font-weight: 600; }
    .bar { flex: 1; height: 6px; background: rgba(0,0,0,0.4); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s ease; }
    .bar-fill.warn { background: var(--warn); }
    
    /* SOLDIER CONTAINER */
    .unit-view {
      flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; backdrop-filter: var(--glass); box-shadow: var(--shadow);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; min-height: 320px;
    }
    .soldier-wrap {
      position: relative; width: 160px; height: 200px; cursor: pointer;
      filter: drop-shadow(0 0 12px var(--accent));
    }
    
    /* SOLDIER SVG ANIMATIONS */
    .soldier-svg {
      width: 100%; height: 100%;
      animation: idle-breathe 3s ease-in-out infinite;
    }
    .soldier-svg.walking { animation: walk-cycle 0.8s steps(2) infinite; }
    .soldier-svg.sleeping { animation: sleep-breathe 3s ease-in-out infinite; opacity: 0.8; }
    .soldier-svg.couch { animation: relax 2s ease-in-out infinite; transform: rotate(5deg); }
    .soldier-svg.mission { animation: alert-shake 0.2s ease-in-out infinite; }
    .soldier-svg.injured { filter: drop-shadow(0 0 15px var(--warn)); }
    
    @keyframes idle-breathe {
      0%, 100% { transform: translateY(0) scaleY(1); }
      50% { transform: translateY(-3px) scaleY(0.98); }
    }
    @keyframes walk-cycle {
      0% { transform: translateX(0) rotate(0); }
      50% { transform: translateX(-5px) rotate(-2deg); }
      100% { transform: translateX(0) rotate(0); }
    }
    @keyframes sleep-breathe {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(5px); }
    }
    @keyframes relax {
      0%, 100% { transform: rotate(5deg) translateY(0); }
      50% { transform: rotate(8deg) translateY(5px); }
    }
    @keyframes alert-shake {
      0%, 100% { transform: translate(0,0); }
      25% { transform: translate(-3px, 2px); }
      50% { transform: translate(2px, -2px); }
      75% { transform: translate(-2px, 1px); }
    }
    
    /* DIALOGUE BUBBLE */
    .dialogue {
      position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 20, 30, 0.95); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 16px; max-width: 280px; min-width: 200px;
      font-size: 0.9rem; text-align: center; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease; box-shadow: var(--shadow);
    }
    .dialogue.show { opacity: 1; }
    
    /* BUTTONS */
    .controls { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
    .btn {
      background: rgba(20, 30, 40, 0.8); border: 1px solid var(--border);
      color: var(--text); padding: 8px 14px; border-radius: 8px;
      font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: rgba(0, 150, 100, 0.3); border-color: var(--accent); transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    .btn.accent { background: rgba(0, 100, 70, 0.6); border-color: var(--accent); color: #fff; }
    .btn.warn { border-color: var(--warn); color: var(--warn); }
    
    /* TERMINAL */
    .terminal-area { display: flex; flex-direction: column; gap: 8px; }
    .input-row { display: flex; gap: 8px; align-items: center; }
    .prompt { color: var(--accent); font-weight: 700; font-family: monospace; }
    #cmdInput {
      flex: 1; background: rgba(0, 10, 15, 0.8); border: 1px solid var(--border);
      color: var(--text); padding: 8px 12px; border-radius: 8px;
      font-size: 0.95rem; outline: none; font-family: monospace;
    }
    #cmdInput:focus { border-color: var(--accent); }
    #terminalLog {
      height: 120px; overflow-y: auto; background: rgba(0, 8, 12, 0.7);
      border: 1px solid var(--border); border-radius: 8px; padding: 8px;
      font-family: monospace; font-size: 0.85rem; line-height: 1.5;
    }
    .log-entry { padding: 2px 0; border-bottom: 1px solid rgba(0, 100, 100, 0.1); }
    .log-time { color: var(--info); margin-right: 8px; }
    .log-tag { padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; margin-right: 6px; }
    .log-tag.ok { background: rgba(0, 255, 136, 0.2); color: var(--accent); }
    .log-tag.warn { background: rgba(255, 77, 77, 0.2); color: var(--warn); }
    
    /* MODAL */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px;
    }
    .modal.show { display: flex; }
    .modal-box {
      background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
      padding: 20px; max-width: 90%; width: 500px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.8);
    }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .modal-close { background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }
    
    /* TOAST */
    .toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      padding: 10px 16px; background: var(--panel); border-left: 4px solid var(--accent);
      border-radius: 8px; box-shadow: var(--shadow); font-size: 0.9rem;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <!-- TOP HUD -->
    <div class="hud-top">
      <div class="hud-panel">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="color:var(--accent);font-weight:700">TCU-01 <span id="callsign">VALKYRIE</span></span>
          <span>LVL: <span id="lvl" style="color:var(--accent)">1</span></span>
          <span>XP: <span id="xp">0/100</span></span>
        </div>
        <div class="stats-grid">
          <div class="stat-row"><span class="stat-label">STA</span><div class="bar"><div id="staBar" class="bar-fill" style="width:100%"></div></div></div>
          <div class="stat-row"><span class="stat-label">DISC</span><div class="bar"><div id="discBar" class="bar-fill" style="width:100%"></div></div></div>
          <div class="stat-row"><span class="stat-label">CORT</span><div class="bar"><div id="cortBar" class="bar-fill" style="width:0%"></div></div></div>
          <div class="stat-row"><span class="stat-label">MOR</span><div class="bar"><div id="morBar" class="bar-fill" style="width:100%"></div></div></div>
        </div>
      </div>
      <div class="hud-panel">
        <div style="font-weight:700;margin-bottom:8px">🧠 PERSONALIDAD</div>
        <div class="stat-row"><span class="stat-label">TRUST</span><div class="bar"><div id="trustBar" class="bar-fill" style="width:50%"></div></div></div>
        <div style="margin-top:8px;font-size:0.85rem">Modo: <span id="mode" style="color:var(--accent)">Táctica</span></div>
        <div style="font-size:0.85rem">Humor: <span id="mood" style="color:var(--info)">Estable</span></div>
      </div>
      <div class="hud-panel">
        <div style="font-weight:700;margin-bottom:8px">🌍 ENTORNO</div>
        <div style="font-size:0.85rem">GTI: <span id="gti">0.3</span> | Clima: <span id="weather">CLR</span></div>
        <div style="font-size:0.85rem;margin-top:6px">💰 <span id="credits">150</span></div>
        <div style="font-size:0.85rem">📦 <span id="payloads">0</span></div>
      </div>
    </div>

    <!-- UNIT VIEW -->
    <div class="unit-view">
      <div class="dialogue" id="dialogue"></div>
      <div class="soldier-wrap" id="soldierWrap">
        <!-- SOLDIER SVG -->
        <svg class="soldier-svg idle" id="soldier" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
          <!-- Helmet -->
          <rect x="35" y="15" width="50" height="35" rx="8" fill="#2a4a4a" stroke="#00ff88" stroke-width="2"/>
          <circle cx="50" cy="30" r="4" fill="#00ff88" opacity="0.8"/>
          <circle cx="70" cy="30" r="4" fill="#00ff88" opacity="0.8"/>
          <!-- Visor -->
          <rect x="40" y="38" width="40" height="8" rx="2" fill="#00ff88" opacity="0.6"/>
          <!-- Body Armor -->
          <rect x="30" y="52" width="60" height="50" rx="10" fill="#1a3a3a" stroke="#00ff88" stroke-width="2"/>
          <rect x="40" y="60" width="40" height="30" rx="4" fill="#2a5a5a" opacity="0.6"/>
          <!-- Arms -->
          <rect x="18" y="55" width="14" height="35" rx="5" fill="#2a4a4a"/>
          <rect x="88" y="55" width="14" height="35" rx="5" fill="#2a4a4a"/>
          <!-- Weapon -->
          <rect x="95" y="65" width="8" height="30" rx="2" fill="#444"/>
          <rect x="92" y="62" width="14" height="6" rx="2" fill="#555"/>
          <!-- Legs -->
          <rect x="35" y="102" width="18" height="40" rx="4" fill="#1a2a2a"/>
          <rect x="67" y="102" width="18" height="40" rx="4" fill="#1a2a2a"/>
          <!-- Boots -->
          <rect x="32" y="138" width="24" height="12" rx="3" fill="#0a1a1a"/>
          <rect x="64" y="138" width="24" height="12" rx="3" fill="#0a1a1a"/>
          <!-- Belt/Pouches -->
          <rect x="35" y="95" width="50" height="8" rx="2" fill="#3a5a3a"/>
          <rect x="40" y="96" width="10" height="6" rx="1" fill="#4a6a4a"/>
          <rect x="55" y="96" width="10" height="6" rx="1" fill="#4a6a4a"/>
          <rect x="70" y="96" width="10" height="6" rx="1" fill="#4a6a4a"/>
        </svg>
      </div>
      <div class="controls">
        <button class="btn accent" onclick="Game.act('feed')">🍽️ Alimentar</button>
        <button class="btn" onclick="Game.act('train')">💪 Entrenar</button>
        <button class="btn" onclick="Game.act('rest')">🛋️ Descansar</button>
        <button class="btn" onclick="Game.act('sleep')">😴 Dormir</button>
        <button class="btn" onclick="Game.act('mission')">🎯 Misión</button>
        <button class="btn" onclick="UI.showSaves()">💾 Guardar/Cargar</button>
        <button class="btn" onclick="UI.showSettings()">⚙️ Opciones</button>
      </div>
    </div>

    <!-- TERMINAL -->
    <div class="terminal-area">
      <div class="input-row">
        <span class="prompt">$</span>
        <input type="text" id="cmdInput" placeholder="help | status | feed | train | mission | save..." autocomplete="off">
      </div>
      <div id="terminalLog">
        <div class="log-entry"><span class="log-time">00:00</span><span class="log-tag ok">SYS</span> Sistema iniciado. TCU-01 en línea. Esperando órdenes.</div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <div class="modal-box">
      <div class="modal-header">
        <div style="font-weight:700;color:var(--accent)" id="modalTitle">TERMINAL</div>
        <button class="modal-close" onclick="UI.closeModal()">✕</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script>
    (function() {
      'use strict';
      
      const CFG = { v: '3.1.0', key: 'c4isr_v3', loopMs: 1000, autoSave: 20000 };
      const ST = {
        unit: { callsign: 'VALKYRIE', lvl: 1, xp: 0, xpNext: 100, sta: 100, disc: 100, cort: 0, mor: 100, trust: 50, mode: 'tactical', state: 'idle', mission: null },
        meta: { theme: 'dark', audio: true, time: 1, gti: 0.3, weather: 'CLR' },
        inv: { credits: 150, payloads: 0 },
        slots: [{}, {}, {}], active: 0, hist: [], hidx: 0
      };

      const U = {
        now() { return new Date().toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit'}); },
        rand(a,b) { return Math.floor(Math.random()*(b-a+1))+a; },
        clamp(v,mn,mx) { return Math.max(mn, Math.min(mx, v)); },
        
        log(msg, tag='SYS', type='info') {
          const el = document.getElementById('terminalLog');
          const d = document.createElement('div');
          d.className = 'log-entry';
          const cls = type === 'warn' ? 'warn' : 'ok';
          d.innerHTML = `<span class="log-time">${U.now()}</span><span class="log-tag ${cls}">${tag}</span>${msg}`;
          el.appendChild(d);
          if (el.children.length > 60) el.removeChild(el.firstChild);
          el.scrollTop = el.scrollHeight;
        },
        
        toast(msg, type='info') {
          const w = document.getElementById('toastWrap');
          const d = document.createElement('div');
          d.className = 'toast';
          d.style.borderLeftColor = type === 'warn' ? 'var(--warn)' : 'var(--accent)';
          d.textContent = `[${type.toUpperCase()}] ${msg}`;
          w.appendChild(d);
          setTimeout(() => d.remove(), 3500);
        },
        
        say(txt) {
          const b = document.getElementById('dialogue');
          b.textContent = txt;
          b.classList.add('show');
          setTimeout(() => b.classList.remove('show'), 4000);
        },
        
        save(slot = ST.active, name = 'auto') {
          const k = `${CFG.key}_s${slot}`;
          const d = { v: CFG.v, ts: Date.now(), name, st: JSON.parse(JSON.stringify(ST)) };
          try {
            localStorage.setItem(k, JSON.stringify(d));
            ST.slots[slot] = { name, ts: d.ts };
            U.log(`Guardado Slot ${slot+1}: ${name}`, 'SAVE', 'ok');
          } catch(e) { U.log('Error guardando', 'ERR', 'warn'); }
        },
        
        load(slot) {
          const k = `${CFG.key}_s${slot}`;
          const r = localStorage.getItem(k);
          if (!r) { U.toast('Slot vacío', 'warn'); return false; }
          try {
            const d = JSON.parse(r);
            Object.assign(ST, d.st);
            UI.sync();
            U.log(`Cargado Slot ${slot+1}`, 'LOAD', 'ok');
            return true;
          } catch(e) { U.toast('Error cargando', 'warn'); return false; }
        },
        
        export() {
          const d = { v: CFG.v, ts: Date.now(), st: ST };
          const b = new Blob([JSON.stringify(d, null, 2)], {type: 'application/json'});
          const a = document.createElement('a');
          a.href = URL.createObjectURL(b);
          a.download = `nexus_${ST.unit.callsign}_${Date.now()}.json`;
          a.click();
          URL.revokeObjectURL(a.href);
          U.toast('Exportado', 'ok');
        },
        
        audio() {
          if (!ST.meta.audio) return;
          try {
            if (!window.ac) window.ac = new (window.AudioContext||window.webkitAudioContext)();
            const o = window.ac.createOscillator();
            const g = window.ac.createGain();
            o.connect(g); g.connect(window.ac.destination);
            o.frequency.value = 660;
            g.gain.setValueAtTime(0.08, window.ac.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, window.ac.currentTime + 0.1);
            o.start(); o.stop(window.ac.currentTime + 0.12);
          } catch(e) {}
        }
      };

      const PERS = {
        line(act) {
          const u = ST.unit;
          const lines = {
            feed: ['Ración aceptada. Eficiencia +.', 'Comida táctica procesada.', 'Nutrientes OK. Gracias.'],
            train: ['Repetición completa. +Disciplina', 'Entrenamiento intenso. Valió la pena.', 'Otra ronda cuando quieras.'],
            rest: ['Descanso táctico. Monitorizando...', 'Recuperando energías...', 'Sofá = refugio temporal.'],
            sleep: ['Sistemas en standby... Zzz', 'Reposando. No molestar.', 'Modo hibernación activado.'],
            mission: ['Desplegando. Radio silencio.', 'Ruta trazada. Vamos.', 'Objetivo en mente.'],
            default: ['¿Necesita análisis?', 'Sistemas estables.', 'Esperando órdenes.']
          };
          const pool = lines[act] || lines.default;
          return pool[U.rand(0, pool.length-1)];
        },
        shift(act) {
          const u = ST.unit;
          if (act === 'train') { u.trust = U.clamp(u.trust - 2, 0, 100); u.mode = u.disc > 80 ? 'tactical' : 'aggressive'; }
          else if (act === 'rest' || act === 'sleep') { u.trust = U.clamp(u.trust + 3, 0, 100); u.mode = 'empathetic'; }
          else if (act === 'mission') { u.trust = U.clamp(u.trust + 4, 0, 100); u.mode = 'tactical'; }
          else { u.trust = U.clamp(u.trust + 1, 0, 100); }
        }
      };

      const Game = {
        init() {
          // Try load slot 0
          const k = `${CFG.key}_s0`;
          if (localStorage.getItem(k)) U.load(0);
          else U.log('Nueva sesión. Unidad inicializada.', 'SYS');
          
          UI.sync();
          setInterval(() => Game.tick(), CFG.loopMs);
          U.log('Game loop iniciado', 'SYS');
        },
        
        tick() {
          const m = ST.meta.time;
          const u = ST.unit;
          
          if (u.state !== 'sleeping') {
            u.sta = U.clamp(u.sta - 0.05 * m, 0, 100);
            u.mor = U.clamp(u.mor - 0.03 * m, 0, 100);
          }
          if (u.state === 'sleeping') {
            u.sta = U.clamp(u.sta + 0.3 * m, 0, 100);
            u.cort = U.clamp(u.cort - 0.1 * m, 0, 100);
          }
          if (u.state === 'couch') u.mor = U.clamp(u.mor + 0.1 * m, 0, 100);
          
          u.mood = u.cort > 60 ? 'Estresada' : u.mor < 40 ? 'Baja' : 'Estable';
          
          if (u.mission) {
            u.mission.timer -= 1 * m;
            if (u.mission.timer <= 0) Game.resolveMission();
          }
          
          // Passive SIGINT
          if (U.rand(1, 100) <= 3) {
            ST.inv.payloads = U.clamp(ST.inv.payloads + 1, 0, 99);
          }
          
          // Auto-save
          if (Date.now() - (u.lastSave || 0) > CFG.autoSave) {
            u.lastSave = Date.now();
            U.save();
          }
          
          UI.updateBars();
        },
        
        act(action) {
          const u = ST.unit;
          const s = document.getElementById('soldier');
          
          console.log('Action:', action); // DEBUG
          
          switch(action) {
            case 'feed':
              if (u.sta >= 100) return U.toast('Stamina máxima', 'warn');
              u.sta = U.clamp(u.sta + 15, 0, 100);
              u.mor = U.clamp(u.mor + 5, 0, 100);
              U.say(PERS.line('feed'));
              break;
              
            case 'train':
              if (u.sta < 20) return U.toast('Muy cansada', 'warn');
              u.sta = U.clamp(u.sta - 10, 0, 100);
              u.disc = U.clamp(u.disc + 8, 0, 100);
              u.xp += 5;
              if (u.xp >= u.xpNext) Game.levelUp();
              U.say(PERS.line('train'));
              break;
              
            case 'rest':
              u.state = 'couch';
              s.className = 'soldier-svg couch';
              U.say(PERS.line('rest'));
              break;
              
            case 'sleep':
              u.state = 'sleeping';
              s.className = 'soldier-svg sleeping';
              U.say(PERS.line('sleep'));
              break;
              
            case 'wake':
              u.state = 'idle';
              s.className = 'soldier-svg idle';
              U.say('Reactivando sistemas. Lista.');
              break;
              
            case 'mission':
              if (u.mission) return U.toast('Misión activa', 'warn');
              if (u.sta < 35) return U.toast('Stamina insuficiente', 'warn');
              const types = ['Recon', 'Intel', 'Strike', 'Cyber'];
              const t = types[U.rand(0, types.length-1)];
              const dur = U.rand(40, 100);
              u.mission = { type: t, diff: U.rand(1, Math.min(4, u.lvl+1)), timer: dur };
              u.state = 'mission';
              s.className = 'soldier-svg mission';
              U.say(PERS.line('mission'));
              U.log(`Misión ${t} iniciada. ETA: ${Math.ceil(dur/60)}min`, 'DEPLOY', 'ok');
              break;
              
            default:
              U.say(PERS.line('default'));
          }
          
          PERS.shift(action);
          U.audio();
          UI.sync();
        },
        
        levelUp() {
          const u = ST.unit;
          u.lvl++;
          u.xp -= u.xpNext;
          u.xpNext = Math.floor(u.xpNext * 1.25);
          u.disc = U.clamp(u.disc + 5, 0, 100);
          U.log(`🎖️ ASCENSO: Nivel ${u.lvl}`, 'SYS', 'ok');
          U.toast(`¡Nivel ${u.lvl}!`, 'ok');
        },
        
        resolveMission() {
          const m = ST.unit.mission;
          const u = ST.unit;
          const chance = U.clamp(60 + u.disc * 0.3 - m.diff * 8, 15, 95);
          const roll = U.rand(1, 100);
          const success = roll <= chance;
          
          if (success) {
            u.xp += 12 * m.diff;
            ST.inv.credits += 15 * m.diff;
            ST.inv.payloads += U.rand(1, m.diff);
            u.sta = U.clamp(u.sta - 8, 0, 100);
            u.disc = U.clamp(u.disc + 3, 0, 100);
            U.say('✅ Objetivo neutralizado. Botín asegurado.');
            U.log(`Misión ${m.type} cumplida. +${12*m.diff}XP +${15*m.diff}cr`, 'OK', 'ok');
          } else {
            u.sta = U.clamp(u.sta - U.rand(5, 12), 0, 100);
            u.cort = U.clamp(u.cort + 10, 0, 100);
            u.mor = U.clamp(u.mor - 8, 0, 100);
            U.say('❌ Comprometidos. Retirada táctica.');
            U.log(`Misión ${m.type} fallida.`, 'FAIL', 'warn');
          }
          
          Game.levelUp();
          u.mission = null;
          u.state = 'idle';
          document.getElementById('soldier').className = 'soldier-svg idle';
          UI.sync();
        }
      };

      const UI = {
        sync() {
          document.getElementById('callsign').textContent = ST.unit.callsign;
          document.getElementById('lvl').textContent = ST.unit.lvl;
          document.getElementById('xp').textContent = `${Math.floor(ST.unit.xp)}/${ST.unit.xpNext}`;
          document.getElementById('mode').textContent = ST.unit.mode.charAt(0).toUpperCase() + ST.unit.mode.slice(1);
          document.getElementById('mood').textContent = ST.unit.mood || 'Estable';
          document.getElementById('trustBar').style.width = `${ST.unit.trust}%`;
          document.getElementById('gti').textContent = ST.meta.gti.toFixed(1);
          document.getElementById('weather').textContent = ST.meta.weather;
          document.getElementById('credits').textContent = ST.inv.credits;
          document.getElementById('payloads').textContent = ST.inv.payloads;
        },
        
        updateBars() {
          const set = (id, val, mn=0, mx=100, warnLow=25) => {
            const el = document.getElementById(id);
            const pct = ((val - mn) / (mx - mn)) * 100;
            el.style.width = `${Math.max(0, pct)}%`;
            el.className = `bar-fill ${val <= warnLow ? 'warn' : ''}`;
          };
          set('staBar', ST.unit.sta);
          set('discBar', ST.unit.disc);
          set('cortBar', ST.unit.cort, 0, 100, 75);
          set('morBar', ST.unit.mor, 0, 100, 30);
        },
        
        showSaves() {
          const slots = ST.slots.map((s, i) => {
            const p = s.ts ? new Date(s.ts).toLocaleString() : 'Vacío';
            return `<div style="padding:10px;background:rgba(0,20,30,0.5);border:1px solid var(--border);border-radius:8px;margin:6px 0;display:flex;justify-content:space-between;align-items:center">
              <div><strong>Slot ${i+1}</strong><br><small>${s.name||'Vacío'} | ${p}</small></div>
              <div style="display:flex;gap:6px">
                <button class="btn" onclick="U.load(${i});UI.closeModal()">Cargar</button>
                <button class="btn accent" onclick="U.save(${i},'Manual');UI.showSaves()">Guardar</button>
              </div>
            </div>`;
          }).join('');
          
          this.showModal('GESTOR DE GUARDADO', `
            ${slots}
            <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn accent" onclick="U.export()">Exportar JSON</button>
              <button class="btn" onclick="document.getElementById('fileIn').click()">Importar JSON</button>
              <input type="file" id="fileIn" accept=".json" style="display:none" onchange="U.import(this.files[0]);UI.closeModal()">
            </div>
          `);
        },
        
        showSettings() {
          this.showModal('OPCIONES', `
            <div style="display:flex;flex-direction:column;gap:12px">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span>Audio</span>
                <button class="btn" onclick="ST.meta.audio=!ST.meta.audio;UI.showSettings()">
                  ${ST.meta.audio ? '🔊 ON' : '🔇 OFF'}
                </button>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span>Escala Temporal</span>
                <button class="btn" onclick="ST.meta.time=ST.meta.time===1?10:1;UI.showSettings()">
                  x${ST.meta.time}
                </button>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span>Tema</span>
                <button class="btn" onclick="ST.meta.theme=ST.meta.theme==='dark'?'matrix':'dark';document.body.dataset.theme=ST.meta.theme==='dark'?'':ST.meta.theme;UI.showSettings()">
                  ${ST.meta.theme.toUpperCase()}
                </button>
              </div>
            </div>
          `);
        },
        
        showModal(title, html) {
          document.getElementById('modalTitle').textContent = title;
          document.getElementById('modalBody').innerHTML = html;
          document.getElementById('modal').classList.add('show');
        },
        
        closeModal() {
          document.getElementById('modal').classList.remove('show');
        }
      };

      // CMD PROCESSOR
      const CMD = {
        exec(raw) {
          const cmd = raw.trim().toLowerCase();
          if (!cmd) return;
          
          if (ST.hist[ST.hist.length-1] !== cmd) ST.hist.push(cmd);
          ST.hidx = ST.hist.length;
          
          U.log(`> ${cmd}`, 'CMD');
          
          const [c, ...args] = cmd.split(/\s+/);
          const arg = args.join(' ');
          
          switch(c) {
            case 'help':
              UI.showModal('COMANDOS', `<pre style="line-height:1.6;font-family:monospace">
status       - Ver estado completo
feed         - Alimentar unidad
train        - Entrenar
rest         - Descansar
sleep        - Dormir
wake         - Despertar
mission      - Iniciar misión
saves        - Gestor de guardado
export       - Exportar save
import       - Importar save
theme        - Cambiar tema
time [1/10]  - Escala temporal
audio [on/off]
clear        - Limpiar terminal</pre>`);
              break;
            case 'status':
              const u = ST.unit;
              UI.showModal('ESTADO', `<pre style="line-height:1.6">
Callsign: ${u.callsign}
Nivel: ${u.lvl} | XP: ${Math.floor(u.xp)}/${u.xpNext}
STA: ${Math.floor(u.sta)} | DISC: ${Math.floor(u.disc)}
CORT: ${Math.floor(u.cort)} | MOR: ${Math.floor(u.mor)}
Trust: ${u.trust}% | Modo: ${u.mode}
Estado: ${u.state}</pre>`);
              break;
            case 'feed': Game.act('feed'); break;
            case 'train': Game.act('train'); break;
            case 'rest': Game.act('rest'); break;
            case 'sleep': Game.act('sleep'); break;
            case 'wake': Game.act('wake'); break;
            case 'mission': Game.act('mission'); break;
            case 'saves': UI.showSaves(); break;
            case 'export': U.export(); break;
            case 'import': 
              const inp = document.createElement('input');
              inp.type = 'file'; inp.accept = '.json';
              inp.onchange = e => U.import(e.target.files[0]);
              inp.click();
              break;
            case 'theme':
              ST.meta.theme = ST.meta.theme === 'dark' ? 'matrix' : 'dark';
              document.body.dataset.theme = ST.meta.theme === 'dark' ? '' : ST.meta.theme;
              break;
            case 'time':
              ST.meta.time = arg === '10' ? 10 : 1;
              U.toast(`Escala: x${ST.meta.time}`, 'ok');
              break;
            case 'audio':
              ST.meta.audio = arg !== 'off';
              U.toast(`Audio: ${ST.meta.audio ? 'ON' : 'OFF'}`, 'ok');
              break;
            case 'clear':
              document.getElementById('terminalLog').innerHTML = '';
              U.log('Terminal limpiado', 'SYS');
              break;
            default:
              U.log('Comando no reconocido. Usa "help"', 'ERR', 'warn');
          }
        }
      };

      // INIT & EVENTS
      window.Game = Game;
      window.UI = UI;
      window.U = U;
      
      document.addEventListener('DOMContentLoaded', () => {
        // Input handler
        const inp = document.getElementById('cmdInput');
        inp.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            CMD.exec(inp.value);
            inp.value = '';
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (ST.hidx > 0) inp.value = ST.hist[--ST.hidx] || '';
          } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (ST.hidx < ST.hist.length) inp.value = ST.hist[++ST.hidx] || '';
          }
        });
        
        // Soldier click to wake
        document.getElementById('soldierWrap').addEventListener('click', () => {
          if (ST.unit.state === 'sleeping' || ST.unit.state === 'couch') {
            Game.act('wake');
          }
        });
        
        // Modal close on backdrop click
        document.getElementById('modal').addEventListener('click', (e) => {
          if (e.target.id === 'modal') UI.closeModal();
        });
        
        // Drag & drop import
        document.addEventListener('dragover', e => e.preventDefault());
        document.addEventListener('drop', e => {
          e.preventDefault();
          if (e.dataTransfer.files[0]?.name.endsWith('.json')) {
            U.import(e.dataTransfer.files[0]);
          }
        });
        
        // Start game
        Game.init();
        inp.focus();
        
        console.log('C4ISR-GOTCHI v3.1 initialized');
      });
    })();
  </script>
</body>
</html>
